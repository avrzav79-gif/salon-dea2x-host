<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pool House — Control de Mesas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0e;
  --s1:#161616;--s2:#1c1c1c;--s3:#242424;--s4:#2c2c2c;
  --txt:#f0f0f0;--txt2:#a0a0a0;--txt3:#606060;
  --green:#22c55e;--green-bg:rgba(34,197,94,.1);--green-border:rgba(34,197,94,.25);
  --red:#ef4444;--red-bg:rgba(239,68,68,.08);--red-border:rgba(239,68,68,.2);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.08);
  --border:#2a2a2a;--border2:#333;
  --radius:12px;--radius-lg:16px;--radius-xl:20px;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(.93);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}

html,body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--txt);min-height:100%}

.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
.loader-ring{width:56px;height:56px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--green);animation:spin .7s linear infinite;position:absolute}
.loader-icon{width:40px;height:40px;border-radius:50%;background:var(--green-bg);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--green);font-family:'Space Grotesk',sans-serif}
.loader-wrap{position:relative;width:56px;height:56px;display:flex;align-items:center;justify-content:center}
.loader p{color:var(--txt3);font-size:11px;letter-spacing:.15em;text-transform:uppercase}

.topbar{background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.5rem;position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;border-radius:10px;background:var(--green-bg);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--green);flex-shrink:0}
.brand-name{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;color:var(--txt);letter-spacing:-.01em}
.brand-sub{font-size:10px;color:var(--txt3);margin-top:1px}
.topright{display:flex;align-items:center;gap:12px}
.live-pill{display:flex;align-items:center;gap:5px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:20px;padding:4px 10px}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.8s ease infinite}
.ldot.off{background:var(--red);animation:none}
.live-txt{font-size:10px;color:var(--green);font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.live-txt.off{color:var(--red)}
.clk{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:500;color:var(--txt2);letter-spacing:.02em}

.syncbar{font-size:10px;text-align:center;padding:5px 1rem;letter-spacing:.08em;text-transform:uppercase;background:#052e16;color:#4ade80;border-bottom:1px solid rgba(34,197,94,.15)}
.syncbar.err{background:#1c0a0a;color:#f87171;border-bottom-color:rgba(239,68,68,.15)}
.syncbar.warn{background:#1c1200;color:#fbbf24;border-bottom-color:rgba(245,158,11,.15)}

.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));border-bottom:1px solid var(--border)}
.stat{padding:.875rem 1.25rem;border-right:1px solid var(--border);background:var(--s1)}
.stat:last-child{border-right:none}
.snum{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;line-height:1;color:var(--txt)}
.snum.g{color:var(--green)}.snum.a{color:var(--amber)}
.slbl{font-size:10px;color:var(--txt3);margin-top:4px;letter-spacing:.06em;text-transform:uppercase}

/* TABS */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:.75rem 1rem;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3);cursor:pointer;border:none;background:transparent;transition:color .15s;border-bottom:2px solid transparent;font-family:'Inter',sans-serif}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.tab:hover:not(.active){color:var(--txt2)}
.tab-panel{display:none}.tab-panel.active{display:block}

.main{padding:1.25rem;max-width:1100px;margin:0 auto}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.sh-left{display:flex;align-items:center;gap:8px}
.sh-title{font-size:11px;text-transform:uppercase;letter-spacing:.15em;font-weight:600;color:var(--txt3)}
.sh-cnt{font-size:11px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);border-radius:20px;padding:2px 8px;font-weight:600}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:1.5rem}

.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .2s,box-shadow .2s,transform .15s;animation:fadeUp .35s ease both;cursor:default}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card.on{border-color:var(--green-border);box-shadow:0 0 0 3px var(--green-bg)}
.card.vip{border-color:rgba(245,158,11,.3)}
.card.vip.on{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-bg)}
.card-top-bar{height:3px;background:var(--border)}
.card.on .card-top-bar{background:var(--green)}
.card.vip .card-top-bar{background:var(--amber)}
.card.vip.on .card-top-bar{background:var(--amber)}
.card-inner{padding:.875rem 1rem}
.crow1{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.mesa-num{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--txt2);letter-spacing:.04em;text-transform:uppercase}
.card.vip .mesa-num{color:var(--amber)}
.estado{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.estado-libre{background:var(--s3);color:var(--txt3);border:1px solid var(--border2)}
.estado-on{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.estado-vip{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.precio-grande{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;color:var(--txt);line-height:1;margin-bottom:4px;letter-spacing:-.02em}
.precio-grande.libre{color:var(--txt3);font-size:24px;font-weight:400}
.precio-grande.on{color:var(--green)}
.timer-row{display:flex;align-items:center;gap:6px;margin-bottom:.75rem;min-height:18px}
.timer-txt{font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--txt3);font-weight:500;letter-spacing:.04em}
.timer-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease infinite;flex-shrink:0}
.rates{background:var(--s2);border-radius:8px;padding:.5rem .75rem;margin-bottom:.75rem}
.rate-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
.rate-row:last-child{margin-bottom:0}
.rate-row .l{color:var(--txt3)}.rate-row .v{color:var(--txt2);font-weight:500;font-family:'Space Grotesk',sans-serif}
.prods-wrap{margin-bottom:.75rem}
.prod-tag{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;margin-bottom:4px;animation:pop .2s ease both}
.prod-tag-name{flex:1;font-size:12px;color:var(--txt2)}
.prod-tag-price{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--txt);margin-right:8px}
.prod-tag-del{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:13px;padding:0 2px;line-height:1;transition:color .15s;flex-shrink:0}
.prod-tag-del:hover{color:var(--red)}
.prods-sub{display:flex;justify-content:space-between;font-size:11px;padding:5px 2px 0;border-top:1px solid var(--border);margin-top:2px}
.prods-sub .l{color:var(--txt3)}.prods-sub .v{color:var(--amber);font-family:'Space Grotesk',sans-serif;font-weight:600}
.cobro{background:var(--s2);border:1px solid var(--green-border);border-radius:10px;padding:.75rem;margin-bottom:.75rem}
.cobro-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.cobro-row .l{color:var(--txt3)}.cobro-row .v{color:var(--txt2);font-family:'Space Grotesk',sans-serif;font-weight:500}
.cobro-total{display:flex;justify-content:space-between;align-items:baseline;margin-top:6px;padding-top:6px;border-top:1px solid var(--green-border)}
.cobro-total .lbl{font-size:11px;color:var(--txt3)}
.cobro-total .val{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--green)}
.cobro-note{font-size:10px;color:var(--txt3);margin-top:4px;text-align:right}
.btn-add-prod{width:100%;padding:8px;border-radius:8px;border:1px dashed var(--border2);background:transparent;color:var(--txt3);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:6px}
.btn-add-prod:hover{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.btn-iniciar{width:100%;padding:10px;border-radius:10px;border:none;background:var(--green);color:#000;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:opacity .15s,transform .1s}
.btn-iniciar:hover{opacity:.85}.btn-iniciar:active{transform:scale(.97)}
.btn-cobrar{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border2);background:var(--s3);color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:all .15s}
.btn-cobrar:hover{border-color:var(--red);color:var(--red)}.btn-cobrar:active{transform:scale(.97)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
@media(min-width:600px){.overlay{align-items:center;padding:1rem}}
.modal{background:var(--s1);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:1.5rem;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;animation:fadeUp .2s ease both;border:1px solid var(--border2);border-bottom:none}
@media(min-width:600px){.modal{border-radius:var(--radius-xl);border-bottom:1px solid var(--border2)}}
.modal-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 1.25rem}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--txt);margin-bottom:2px}
.modal-sub{font-size:11px;color:var(--txt3);margin-bottom:1.25rem;letter-spacing:.06em;text-transform:uppercase}
.modal-cat{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--txt3);margin-bottom:.5rem;font-weight:600}
.modal-sep{height:1px;background:var(--border);margin:.875rem 0}
.saved-area{margin-bottom:.75rem;min-height:28px}
.saved-chip{display:inline-flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;margin:0 4px 4px 0;transition:all .15s;color:var(--txt2)}
.saved-chip:hover{border-color:var(--green);color:var(--green)}
.saved-chip-del{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:11px;padding:0 0 0 2px;line-height:1;transition:color .15s}
.saved-chip-del:hover{color:var(--red)}
.inp-row{display:flex;gap:8px;margin-bottom:.875rem}
.inp{flex:1;padding:10px 12px;background:var(--s2);border:1px solid var(--border2);border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;color:var(--txt);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--green)}.inp::placeholder{color:var(--txt3)}
.inp-sm{flex:none;width:104px}
.btn-m-add{width:100%;padding:11px;border-radius:10px;background:var(--green);color:#000;border:none;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;margin-bottom:8px;transition:opacity .15s}
.btn-m-add:hover{opacity:.85}
.btn-m-cancel{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--txt3);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:border-color .15s}
.btn-m-cancel:hover{border-color:var(--txt3);color:var(--txt)}

/* HISTORIAL */
.hist-pad{padding:1.25rem;max-width:1100px;margin:0 auto}
.hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.hist-actions{display:flex;gap:8px}
.btn-borrar-todo{font-size:11px;background:transparent;border:1px solid var(--red-border);border-radius:8px;padding:4px 10px;cursor:pointer;color:var(--red);font-family:'Inter',sans-serif;transition:all .15s}
.btn-borrar-todo:hover{background:var(--red-bg)}
.hitem{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px;animation:fadeUp .25s ease both}
.hleft{flex:1;min-width:0}
.hleft .hn{font-size:13px;font-weight:600;color:var(--txt);font-family:'Space Grotesk',sans-serif}
.hleft .hd{font-size:11px;color:var(--txt3);margin-top:2px}
.hamt{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--green);white-space:nowrap;flex-shrink:0}
.btn-del-hist{background:none;border:1px solid var(--border2);border-radius:7px;cursor:pointer;color:var(--txt3);font-size:11px;padding:4px 8px;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap;flex-shrink:0}
.btn-del-hist:hover{border-color:var(--red);color:var(--red);background:var(--red-bg)}

/* CALENDARIO */
.cal-pad{padding:1.25rem;max-width:1100px;margin:0 auto}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:12px}
.cal-nav{display:flex;align-items:center;gap:10px}
.cal-month{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--txt);min-width:170px;text-align:center;letter-spacing:-.01em}
.cal-btn{background:var(--s2);border:1px solid var(--border2);border-radius:8px;color:var(--txt2);font-size:16px;width:32px;height:32px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;line-height:1}
.cal-btn:hover{border-color:var(--green);color:var(--green)}
.cal-summary{display:flex;gap:10px;flex-wrap:wrap}
.cal-scard{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:.5rem .875rem;min-width:80px}
.cal-scard-num{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--green)}
.cal-scard-lbl{font-size:10px;color:var(--txt3);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.cal-dows{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;margin-bottom:4px}
.cal-dow{font-size:10px;font-weight:600;color:var(--txt3);text-align:center;padding:.375rem 0;letter-spacing:.06em;text-transform:uppercase}
.cal-days{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px}
.cday{background:var(--s1);border:1px solid var(--border);border-radius:10px;min-height:70px;padding:.5rem .625rem .5rem;cursor:pointer;transition:border-color .15s,background .15s;position:relative;display:flex;flex-direction:column}
.cday:hover{border-color:var(--border2);background:var(--s2)}
.cday.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;min-height:70px}
.cday.today{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.05)}
.cday.has-data{border-color:rgba(34,197,94,.25)}
.cday.selected{border-color:var(--green);background:var(--green-bg);box-shadow:0 0 0 2px rgba(34,197,94,.15)}
.cday-num{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--txt3);line-height:1;margin-bottom:auto}
.cday.today .cday-num{color:var(--green)}
.cday-amt{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--green);margin-top:4px;line-height:1}
.cday-sess{font-size:10px;color:var(--txt3);margin-top:2px}
/* Intensidad de color por monto */
.cday.lvl1{background:rgba(34,197,94,.04)}
.cday.lvl2{background:rgba(34,197,94,.08)}
.cday.lvl3{background:rgba(34,197,94,.14)}
.cday.lvl4{background:rgba(34,197,94,.22)}

/* Panel detalle día */
.day-detail{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-top:1rem;animation:fadeUp .2s ease both}
.dd-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem;padding-bottom:.875rem;border-bottom:1px solid var(--border)}
.dd-date{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--txt)}
.dd-total{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--green)}
.dd-item{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:4px}
.dd-item-left{flex:1}
.dd-item-name{font-size:12px;font-weight:600;color:var(--txt);font-family:'Space Grotesk',sans-serif}
.dd-item-info{font-size:11px;color:var(--txt3);margin-top:2px}
.dd-item-amt{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--green);white-space:nowrap}
.dd-empty{font-size:12px;color:var(--txt3);text-align:center;padding:1.5rem 0}

@media(max-width:520px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat:nth-child(2){border-right:none}
  .stat:nth-child(3){border-top:1px solid var(--border)}
  .topbar{padding:.75rem 1rem}
  .main,.cal-pad,.hist-pad{padding:1rem}
  .cday{min-height:54px}
  .cday-amt{font-size:10px}
  .cal-header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-wrap">
    <div class="loader-ring"></div>
    <div class="loader-icon">8</div>
  </div>
  <p>Conectando...</p>
</div>

<div id="root" style="display:none">
  <div class="syncbar" id="syncBar">Conectando...</div>

  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">8</div>
      <div>
        <div class="brand-name">Pool House</div>
        <div class="brand-sub">Control de mesas</div>
      </div>
    </div>
    <div class="topright">
      <div class="live-pill">
        <div class="ldot" id="ldot"></div>
        <span class="live-txt" id="ltxt">En vivo</span>
      </div>
      <div class="clk" id="clk">--:--:--</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="snum g" id="sA">0</div><div class="slbl">Activas</div></div>
    <div class="stat"><div class="snum g" id="sL">$0</div><div class="slbl">En curso</div></div>
    <div class="stat"><div class="snum a" id="sP">$0</div><div class="slbl">Productos</div></div>
    <div class="stat"><div class="snum" id="sT">$0</div><div class="slbl">Recaudado hoy</div></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('mesas',this)">Mesas</button>
    <button class="tab" onclick="switchTab('historial',this)">Historial</button>
    <button class="tab" onclick="switchTab('calendario',this)">Calendario</button>
  </div>

  <!-- TAB MESAS -->
  <div class="tab-panel active" id="tab-mesas">
    <div class="main">
      <div class="sh">
        <div class="sh-left">
          <div class="sh-title">Mesas</div>
          <div class="sh-cnt" id="aCnt">0 activas</div>
        </div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <!-- TAB HISTORIAL -->
  <div class="tab-panel" id="tab-historial">
    <div class="hist-pad">
      <div class="hist-header">
        <div class="sh-title">Sesiones cerradas</div>
        <div class="hist-actions">
          <button class="btn-borrar-todo" onclick="clearAllHist()">Borrar todo</button>
        </div>
      </div>
      <div id="histList"><div class="dd-empty">Sin sesiones cerradas aún</div></div>
    </div>
  </div>

  <!-- TAB CALENDARIO -->
  <div class="tab-panel" id="tab-calendario">
    <div class="cal-pad">
      <div class="cal-header">
        <div class="cal-nav">
          <button class="cal-btn" onclick="calMove(-1)">&#8249;</button>
          <div class="cal-month" id="calMonth">—</div>
          <button class="cal-btn" onclick="calMove(1)">&#8250;</button>
        </div>
        <div class="cal-summary">
          <div class="cal-scard"><div class="cal-scard-num" id="calTotal">$0</div><div class="cal-scard-lbl">Este mes</div></div>
          <div class="cal-scard"><div class="cal-scard-num" id="calSess">0</div><div class="cal-scard-lbl">Sesiones</div></div>
          <div class="cal-scard"><div class="cal-scard-num" id="calBest">$0</div><div class="cal-scard-lbl">Mejor día</div></div>
          <div class="cal-scard"><div class="cal-scard-num" id="calAvg">$0</div><div class="cal-scard-lbl">Promedio/día</div></div>
        </div>
      </div>
      <div class="cal-dows" id="calDows"></div>
      <div class="cal-days" id="calDays"></div>
      <div id="calDetail"></div>
    </div>
  </div>
</div>

<!-- MODAL PRODUCTOS -->
<div class="overlay" id="ov" style="display:none" onclick="ovClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mt">Agregar producto</div>
    <div class="modal-sub" id="ms">Mesa —</div>
    <div class="modal-cat">Guardados</div>
    <div class="saved-area" id="savedArea"></div>
    <div class="modal-sep"></div>
    <div class="modal-cat">Nuevo producto</div>
    <div class="inp-row">
      <input class="inp" id="cN" placeholder="Nombre">
      <input class="inp inp-sm" id="cP" placeholder="Precio $" type="number">
    </div>
    <button class="btn-m-add" onclick="submitC()">Agregar y guardar</button>
    <button class="btn-m-cancel" onclick="closeM()">Cancelar</button>
  </div>
</div>

<script>
const FB={
  apiKey:"AIzaSyAOI4Uz3sHTaDnmtjXn3qvanTqC0sm-QcI",
  authDomain:"salon-host.firebaseapp.com",
  databaseURL:"https://salon-host-default-rtdb.firebaseio.com",
  projectId:"salon-host",
  storageBucket:"salon-host.firebasestorage.app",
  messagingSenderId:"918125976760",
  appId:"1:918125976760:web:a7b2e4ea800d15e5f5e84d",
  measurementId:"G-01YJKKJ5S3"
};

const TABLES=[
  {id:1,rate:5000,vip:true},
  {id:2,rate:3500},{id:3,rate:3500},{id:4,rate:3500},
  {id:5,rate:3500},{id:6,rate:3500},{id:7,rate:3500},{id:8,rate:3500},
];

let ST={}, HIST={}, SAVED={};
let closedTotal=0, modalT=null, db=null;
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();
let calSelectedDay=null;

TABLES.forEach(t=>{ST[t.id]={on:false,start:null,prods:[]};});

// ── HELPERS ──────────────────────────────────────────────────
const r100=n=>Math.round(n/100)*100;
const clp=n=>'$'+Math.round(n).toLocaleString('es-CL');
const clpR=n=>'$'+r100(n).toLocaleString('es-CL');
function hms(ms){
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return (h?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');
}
const tPrice=(id,now)=>{const s=ST[id];if(!s?.on)return 0;return((now-s.start)/3600000)*TABLES.find(x=>x.id===id).rate;};
const pTotal=id=>(ST[id]?.prods||[]).reduce((a,p)=>a+p.price,0);
function dateKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='calendario') renderCal();
}

// ── FIREBASE ─────────────────────────────────────────────────
function initFB(){
  try{
    firebase.initializeApp(FB);
    db=firebase.database();
    db.ref('.info/connected').on('value',s=>{setSyncBar(s.val()===true?'ok':'err');});
    db.ref('state').on('value',s=>{
      const v=s.val();
      if(v) TABLES.forEach(t=>{ST[t.id]=v[t.id]||{on:false,start:null,prods:[]};if(!ST[t.id].prods)ST[t.id].prods=[];});
      render();
    });
    db.ref('history').on('value',s=>{
      HIST=s.val()||{};
      closedTotal=Object.values(HIST).reduce((a,h)=>a+h.total,0);
      renderHist();
      if(document.getElementById('tab-calendario').classList.contains('active')) renderCal();
    });
    db.ref('savedProds').on('value',s=>{SAVED=s.val()||{};});
    show();
  }catch(e){setSyncBar('warn');show();render();}
}

function setSyncBar(s){
  const bar=document.getElementById('syncBar'),dot=document.getElementById('ldot'),lt=document.getElementById('ltxt');
  if(s==='ok'){bar.textContent='● Sincronizado en tiempo real — todos los dispositivos ven lo mismo';bar.className='syncbar';dot.className='ldot';lt.className='live-txt';}
  else if(s==='warn'){bar.textContent='⚠ Sin Firebase — modo local';bar.className='syncbar warn';dot.className='ldot off';lt.className='live-txt off';}
  else{bar.textContent='✕ Sin conexión — reconectando...';bar.className='syncbar err';dot.className='ldot off';lt.className='live-txt off';}
}
function show(){document.getElementById('loader').style.display='none';document.getElementById('root').style.display='block';}
const push=(p,v)=>db&&db.ref(p).set(v).catch(()=>{});
const rmPath=p=>db&&db.ref(p).remove().catch(()=>{});

// ── MESAS ─────────────────────────────────────────────────────
function startT(id){ST[id]={on:true,start:Date.now(),prods:[]};push('state/'+id,ST[id]);render();}
function stopT(id){
  const now=Date.now(),tp=tPrice(id,now),pp=pTotal(id),total=r100(tp+pp),key='h'+now;
  push('history/'+key,{key,name:'Mesa '+id,elapsed:now-ST[id].start,tableAmt:r100(tp),prodAmt:r100(pp),total,time:new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}),ts:now});
  ST[id]={on:false,start:null,prods:[]};push('state/'+id,ST[id]);render();
}
function rmProd(tableId,idx){
  const prods=[...(ST[tableId]?.prods||[])];prods.splice(idx,1);
  ST[tableId].prods=prods;push('state/'+tableId,ST[tableId]);render();
}

// ── HISTORIAL ─────────────────────────────────────────────────
function deleteHist(key){rmPath('history/'+key);}
function clearAllHist(){if(confirm('¿Borrar todo el historial?'))rmPath('history');}

// ── PRODUCTOS GUARDADOS ───────────────────────────────────────
function deleteSaved(key){rmPath('savedProds/'+key);}

// ── MODAL ─────────────────────────────────────────────────────
function openM(id){
  modalT=id;
  document.getElementById('mt').textContent='Agregar producto';
  document.getElementById('ms').textContent='Mesa '+id;
  document.getElementById('cN').value='';document.getElementById('cP').value='';
  renderSaved();document.getElementById('ov').style.display='flex';
}
function renderSaved(){
  const area=document.getElementById('savedArea'),entries=Object.entries(SAVED);
  if(!entries.length){area.innerHTML='<span style="font-size:11px;color:var(--txt3)">Ninguno guardado aún</span>';return;}
  area.innerHTML=entries.map(([key,p])=>`<span class="saved-chip" onclick="addP('${p.name}',${p.price})">${p.name} · ${clp(p.price)}<button class="saved-chip-del" onclick="event.stopPropagation();deleteSaved('${key}')">✕</button></span>`).join('');
}
function closeM(){document.getElementById('ov').style.display='none';modalT=null;}
function ovClick(e){if(e.target===document.getElementById('ov'))closeM();}
function addP(name,price){
  if(!modalT)return;
  const prods=[...(ST[modalT]?.prods||[])];prods.push({name,price:+price});
  ST[modalT].prods=prods;push('state/'+modalT,ST[modalT]);closeM();render();
}
function submitC(){
  const n=document.getElementById('cN').value.trim(),p=parseFloat(document.getElementById('cP').value);
  if(!n||!p||isNaN(p))return;
  if(!Object.values(SAVED).some(x=>x.name.toLowerCase()===n.toLowerCase())){const key='sp'+Date.now();push('savedProds/'+key,{name:n,price:p,key});}
  addP(n,p);
}

// ── RENDER MESAS ──────────────────────────────────────────────
function render(){
  const now=Date.now(),grid=document.getElementById('grid');
  grid.innerHTML='';
  TABLES.forEach((t,i)=>{
    const s=ST[t.id]||{on:false,start:null,prods:[]},tp=s.on?tPrice(t.id,now):0,pp=pTotal(t.id),total=tp+pp,isVip=t.vip;
    const card=document.createElement('div');
    card.className='card'+(s.on?' on':'')+(isVip?' vip':'');
    card.style.animationDelay=(i*.04)+'s';
    const prodsH=(s.prods||[]).length?`<div class="prods-wrap">${s.prods.map((p,idx)=>`<div class="prod-tag"><span class="prod-tag-name">${p.name}</span><span class="prod-tag-price">${clp(p.price)}</span><button class="prod-tag-del" onclick="rmProd(${t.id},${idx})">✕</button></div>`).join('')}<div class="prods-sub"><span class="l">Subtotal</span><span class="v">${clp(pp)}</span></div></div>`:'';
    const cobroH=s.on?`<div class="cobro"><div class="cobro-row"><span class="l">Mesa · ${hms(now-s.start)}</span><span class="v">${clpR(tp)}</span></div>${pp>0?`<div class="cobro-row"><span class="l">Productos</span><span class="v">${clpR(pp)}</span></div>`:''}<div class="cobro-total"><span class="lbl">Total a cobrar</span><span class="val">${clpR(total)}</span></div><div class="cobro-note">Redondeado a la centena más cercana</div></div>`:'';
    card.innerHTML=`<div class="card-top-bar"></div><div class="card-inner"><div class="crow1"><span class="mesa-num">${isVip?'★ ':''}Mesa ${t.id}</span><span class="estado ${s.on?(isVip?'estado-vip':'estado-on'):'estado-libre'}">${s.on?(isVip?'VIP':'Activa'):'Libre'}</span></div><div class="precio-grande ${s.on?'on':'libre'}" id="pr-${t.id}">${s.on?clp(total):'—'}</div><div class="timer-row" id="tr-${t.id}">${s.on?`<div class="timer-dot"></div><span class="timer-txt" id="tm-${t.id}">${hms(now-s.start)}</span>`:''}</div><div class="rates"><div class="rate-row"><span class="l">Por hora</span><span class="v">${clp(t.rate)}</span></div>${s.on?`<div class="rate-row"><span class="l">Solo mesa</span><span class="v" id="mp-${t.id}">${clp(tp)}</span></div>`:''}</div>${prodsH}${cobroH}${s.on?`<button class="btn-add-prod" onclick="openM(${t.id})">+ Agregar producto</button>`:''}${s.on?`<button class="btn-cobrar" onclick="stopT(${t.id})">Cobrar · ${clpR(total)}</button>`:`<button class="btn-iniciar" onclick="startT(${t.id})">Iniciar</button>`}</div>`;
    grid.appendChild(card);
  });
  updateStats(now);
}

function updateStats(now){
  let a=0,live=0,livep=0;
  TABLES.forEach(t=>{if(ST[t.id]?.on){a++;live+=tPrice(t.id,now);livep+=pTotal(t.id);}});
  document.getElementById('sA').textContent=a;
  document.getElementById('sL').textContent=clp(live);
  document.getElementById('sP').textContent=clp(livep);
  document.getElementById('sT').textContent=clp(closedTotal);
  document.getElementById('aCnt').textContent=a+(a===1?' activa':' activas');
}

function renderHist(){
  const list=document.getElementById('histList');
  const entries=Object.values(HIST).sort((a,b)=>b.ts-a.ts);
  if(!entries.length){list.innerHTML='<div class="dd-empty">Sin sesiones cerradas aún</div>';return;}
  list.innerHTML=entries.slice(0,50).map(h=>`<div class="hitem"><div class="hleft"><div class="hn">${h.name}</div><div class="hd">${h.time} · ${hms(h.elapsed)}${h.prodAmt>0?' · Productos '+clpR(h.prodAmt):''}</div></div><div class="hamt">${clpR(h.total)}</div><button class="btn-del-hist" onclick="deleteHist('${h.key}')">Borrar</button></div>`).join('');
}

// ── CALENDARIO ────────────────────────────────────────────────
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DOWS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

function calMove(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  calSelectedDay=null;
  renderCal();
}

function renderCal(){
  document.getElementById('calMonth').textContent=MESES[calMonth]+' '+calYear;

  // Agrupar historial por día
  const byDay={};
  Object.values(HIST).forEach(h=>{
    const d=new Date(h.ts);
    if(d.getFullYear()===calYear && d.getMonth()===calMonth){
      const k=dateKey(h.ts);
      if(!byDay[k]){byDay[k]={total:0,sessions:[],count:0};}
      byDay[k].total+=h.total;
      byDay[k].count++;
      byDay[k].sessions.push(h);
    }
  });

  // Stats del mes
  const totals=Object.values(byDay).map(d=>d.total);
  const monthTotal=totals.reduce((a,b)=>a+b,0);
  const sessCount=Object.values(byDay).reduce((a,d)=>a+d.count,0);
  const bestDay=totals.length?Math.max(...totals):0;
  const daysWithData=totals.filter(t=>t>0).length;
  const avg=daysWithData?Math.round(monthTotal/daysWithData):0;

  document.getElementById('calTotal').textContent=clpR(monthTotal);
  document.getElementById('calSess').textContent=sessCount;
  document.getElementById('calBest').textContent=clpR(bestDay);
  document.getElementById('calAvg').textContent=clpR(avg);

  // Días de la semana header
  const dowsEl=document.getElementById('calDows');
  dowsEl.innerHTML=DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  // Calcular primer día (lunes=0)
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const offset=(firstDay+6)%7; // lunes primero
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  const isCurrentMonth=today.getFullYear()===calYear&&today.getMonth()===calMonth;

  // Niveles de color
  const lvl=v=>{
    if(!v)return '';
    if(v<10000)return 'lvl1';
    if(v<25000)return 'lvl2';
    if(v<50000)return 'lvl3';
    return 'lvl4';
  };

  const daysEl=document.getElementById('calDays');
  let html='';
  for(let i=0;i<offset;i++) html+=`<div class="cday empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const key=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const data=byDay[key];
    const isToday=isCurrentMonth&&d===today.getDate();
    const isSel=calSelectedDay===key;
    const hasData=!!data;
    let cls='cday';
    if(isToday)cls+=' today';
    if(hasData)cls+=' has-data '+lvl(data.total);
    if(isSel)cls+=' selected';
    html+=`<div class="${cls}" onclick="selectDay('${key}')">
      <div class="cday-num">${d}</div>
      ${hasData?`<div class="cday-amt">${clpR(data.total)}</div><div class="cday-sess">${data.count} ses.</div>`:''}
    </div>`;
  }
  daysEl.innerHTML=html;

  if(calSelectedDay&&byDay[calSelectedDay]) renderDayDetail(calSelectedDay,byDay[calSelectedDay]);
  else document.getElementById('calDetail').innerHTML='';
}

function selectDay(key){
  calSelectedDay=calSelectedDay===key?null:key;
  renderCal();
}

function renderDayDetail(key,data){
  const [y,m,d]=key.split('-');
  const dateStr=parseInt(d)+' de '+MESES[parseInt(m)-1]+' '+y;
  const sessions=data.sessions.sort((a,b)=>b.ts-a.ts);
  document.getElementById('calDetail').innerHTML=`
    <div class="day-detail">
      <div class="dd-header">
        <div class="dd-date">${dateStr}</div>
        <div class="dd-total">${clpR(data.total)}</div>
      </div>
      ${sessions.map(h=>`
        <div class="dd-item">
          <div class="dd-item-left">
            <div class="dd-item-name">${h.name}</div>
            <div class="dd-item-info">${h.time} · ${hms(h.elapsed)}${h.prodAmt>0?' · Productos '+clpR(h.prodAmt):''}</div>
          </div>
          <div class="dd-item-amt">${clpR(h.total)}</div>
        </div>`).join('')}
    </div>`;
}

// ── TICK ──────────────────────────────────────────────────────
setInterval(()=>{
  const now=Date.now();
  document.getElementById('clk').textContent=new Date().toLocaleTimeString('es-CL');
  let live=0,livep=0;
  TABLES.forEach(t=>{
    if(!ST[t.id]?.on)return;
    const tp=tPrice(t.id,now),pp=pTotal(t.id);live+=tp;livep+=pp;
    const pe=document.getElementById('pr-'+t.id),te=document.getElementById('tm-'+t.id),mp=document.getElementById('mp-'+t.id);
    if(pe)pe.textContent=clp(tp+pp);if(te)te.textContent=hms(now-ST[t.id].start);if(mp)mp.textContent=clp(tp);
  });
  document.getElementById('sL').textContent=clp(live);
  document.getElementById('sP').textContent=clp(livep);
  document.getElementById('sA').textContent=TABLES.filter(t=>ST[t.id]?.on).length;
},1000);

initFB();
</script>
</body>
</html>
